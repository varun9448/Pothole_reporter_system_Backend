services:
  mysql:
    image: mysql:8.0
    container_name: pothole-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "varun2005###"
      MYSQL_DATABASE: "pothole_db"
    ports:
      - "3307:3306"
    volumes:
      - pothole_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pvarun2005###"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./pothole
    container_name: pothole-backend
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/pothole_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "varun2005###"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: "C:/Users/varun/Downloads/pothole-reporter-frontend1/pothole-reporter-frontend"
      args:
        VITE_API_BASE: "${VITE_API_BASE:-http://localhost:8080/api}"
    container_name: pothole-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pothole_mysql_data:
